<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Ohmyfood</title>
    <!-- Pages css -->
    <link rel="stylesheet" href="ASSET-IMAGE/style.css" />
    <!-- Police d'écriture -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Shrikhand&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <script
      src="https://kit.fontawesome.com/ebe0d9e0e9.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header class="homepage">
      <div class="header">
        <img
          class="header-logo"
          src="./ASSET-IMAGE/Images et textes Ohmyfood/images/logo/ohmyfood.png"
          alt="logo ohmyfood"
        />
        <form method="post" action="#" class="barre-recherche">
          <div class="icone-localisation">
            <i class="fa-solid fa-location-dot"></i>
          </div>
          <div class="lieu-paris">
            <input
              type="search"
              id="lieu-rechercher"
              placeholder="Paris, Belleville"
            />
          </div>
        </form>
      </div>
    </header>
    <main>
      <section class="titre-haut">
        <h1>Réservez le menu qui vous convient</h1>
        <p>Découvrez des restaurants d'exeption, séléctionnés par nos soins.</p>
        <a href="#restaurant" class="button-violet">Explorer nos restaurants</a>
      </section>
    </main>
  </body>
</html>
